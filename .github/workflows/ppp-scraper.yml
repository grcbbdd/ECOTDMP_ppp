name: PPP Scraper (macOS)

on:
  # 允許手動觸發（前端「立即執行」按鈕使用）
  workflow_dispatch:

  # 每日自動排程 08:30 台灣時間 = UTC 00:30
  schedule:
    - cron: '30 0 * * 1-5'

jobs:
  run-ppp-crawler:
    name: 促參平台爬蟲（macOS Runner）
    runs-on: macos-latest   # macOS Runner 可繞過政府 IP 封鎖
    timeout-minutes: 60

    steps:
      - name: Checkout ECOTDMP_ppp (this repo, for workflow only)
        uses: actions/checkout@v4

      - name: Checkout main repo (ECOTDMP) to get crawler code
        uses: actions/checkout@v4
        with:
          repository: grcbbdd/ECOTDMP
          token: ${{ secrets.ECOTDMP_PAT }}
          path: ecotdmp

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'ecotdmp/working_tools/requirements.txt'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ecotdmp/working_tools/requirements.txt

      - name: Install Playwright browsers (macOS)
        run: |
          cd ecotdmp/working_tools
          python -m playwright install chromium
          python -m playwright install-deps chromium || true

      - name: Run PPP Crawler
        run: |
          cd ecotdmp/working_tools
          mkdir -p 爬蟲資料範例
          echo "Starting PPP crawler on macOS runner..."
          python batch_run_crawlers.py --crawlers promotion 2>&1 || true
          echo "PPP crawler finished"
        env:
          PYTHONIOENCODING: 'utf-8'

      - name: Check output files
        run: |
          echo "=== Crawler output files ==="
          ls -lh ecotdmp/working_tools/爬蟲資料範例/ 2>/dev/null || echo "No output files found"

      - name: Run daily_master_update to merge PPP data
        run: |
          cd ecotdmp/working_tools
          python daily_master_update.py --no-push --no-cleanup 2>&1 || true
        env:
          PYTHONIOENCODING: 'utf-8'

      - name: Update last_update.json
        run: |
          TIMESTAMP=$(TZ='Asia/Taipei' date '+%Y-%m-%dT%H:%M:%S+08:00')
          printf '{"updated_at": "%s", "source": "ppp_macos_runner", "run": "%s"}\n' \
            "$TIMESTAMP" "${{ github.run_id }}" \
            > ecotdmp/frontend/public/data/last_update.json
          echo "Timestamp updated: $TIMESTAMP"

      - name: Commit and Push data back to ECOTDMP (main repo)
        run: |
          cd ecotdmp
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git add frontend/public/data/*.json
          git add working_tools/爬蟲資料範例/ 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No PPP data changes to commit"
          else
            TW_TIME=$(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M')
            git commit -m "auto-update ppp data (macOS runner) $TW_TIME"
            for i in 1 2 3; do
              echo "Push attempt $i..."
              git pull --rebase origin main --autostash && git push origin main && echo "Push completed" && break
              echo "Attempt $i failed, retrying in 10s..."
              sleep 10
            done
          fi
